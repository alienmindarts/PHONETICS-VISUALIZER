<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfabeto Fonético 5x5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Alfabeto 5x5</h1>
        
        <div class="tabs">
            <button id="btnTabText" class="tab-btn active">Modo Texto</button>
            <button id="btnTabDraw" class="tab-btn">Modo Desenho</button>
            <button id="btnTabGame" class="tab-btn">Modo Jogo</button>
        </div>

        <div class="toolbar-area">
            <div class="toolbar-buttons">
                <button id="btnExport" class="toolbar-btn" title="Exportar blocos">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
                <div id="exportMenu" class="dropdown-menu hidden">
                    <button data-format="png">PNG</button>
                    <button data-format="jpeg">JPEG</button>
                    <button data-format="webp">WebP</button>
                    <button data-format="svg">SVG</button>
                </div>
                <button id="btnSettingsToggle" class="toolbar-btn" title="Personalização">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
            <div id="settingsPanel" class="settings-panel hidden">
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>Fundo da página</label>
                        <input type="color" id="cfgPageBg" value="#1a1a1a">
                    </div>
                    <div class="setting-item">
                        <label>Caixa dos blocos</label>
                        <input type="color" id="cfgBoxBg" value="#222222">
                    </div>
                    <div class="setting-item">
                        <label>Células preenchidas</label>
                        <input type="color" id="cfgCellFill" value="#ffffff">
                    </div>
                    <div class="setting-item">
                        <label>Células vazias</label>
                        <input type="color" id="cfgCellEmpty" value="#2a2a2a">
                    </div>
                    <div class="setting-item">
                        <label>Arredondamento <span class="val-label" id="lblCornerRadius">0</span></label>
                        <input type="range" id="cfgCornerRadius" min="0" max="10" value="0" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Tamanho blocos <span class="val-label" id="lblCellSize">20</span>px</label>
                        <input type="range" id="cfgCellSize" min="10" max="40" value="20" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Blocos/linha <span class="val-label" id="lblBlocksPerRow">auto</span></label>
                        <input type="range" id="cfgBlocksPerRow" min="0" max="20" value="0" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Espaço blocos <span class="val-label" id="lblBlockMargin">22</span>px</label>
                        <input type="range" id="cfgBlockMargin" min="4" max="60" value="22" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Margem células <span class="val-label" id="lblGap">3</span>px</label>
                        <input type="range" id="cfgGap" min="0" max="10" value="3" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Quebra linhas <span class="val-label" id="lblBlockRowGap">20</span>px</label>
                        <input type="range" id="cfgBlockRowGap" min="4" max="60" value="20" step="1">
                    </div>
                    <div class="setting-item">
                        <label>Contorno 3x3</label>
                        <div class="guide-controls">
                            <label class="switch small-switch">
                                <input type="checkbox" id="cfgShowGuide" checked>
                                <span class="slider"></span>
                            </label>
                            <input type="color" id="cfgGuideColor" value="#3d3d3d">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tabText" class="tab-content active">
            <input type="text" id="textInput" placeholder="Escreve uma palavra..." autocomplete="off">

            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="toggleInputTexto" checked>
                    <span class="slider"></span>
                </label>
                <span>Mostrar texto original</span>
            </div>

            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="toggleLegendaOriginal">
                    <span class="slider"></span>
                </label>
                <span>Legenda de cada bloco</span>
            </div>

            <div class="canvas-container">
                <canvas id="canvasText" width="800" height="240"></canvas>
            </div>
        </div>

        <div id="tabDraw" class="tab-content">
            <p class="instrucoes">Clica nas células para alternar estados. Clica no '+' para novo bloco.</p>
            
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="toggleTraducao" checked>
                    <span class="slider"></span>
                </label>
                <span>Mostrar tradução das letras</span>
            </div>

            <div class="draw-mode-container">
                <div class="canvas-scroll-area">
                    <canvas id="canvasDraw" width="800" height="240"></canvas>
                </div>
                <button id="btnAddNewBlock" class="add-block-btn">+</button>
            </div>
        </div>

        <div id="tabGame" class="tab-content">
            <p class="instrucoes">Observa os blocos e escreve a palavra correspondente.</p>
            <div class="canvas-container">
                <canvas id="canvasGame" width="600" height="100"></canvas>
            </div>
            <input type="text" id="gameInput" placeholder="Escreve a palavra..." autocomplete="off">
            <div id="feedbackGame"></div>
            <div id="progressContainer" class="progress-container">
              <div id="progressBar" class="progress-bar"></div>
              <span id="progressLabel" class="progress-label"></span>
            </div>
            <div class="game-buttons">
              <button id="btnNovaPalavra" class="add-block-btn">Nova Palavra</button>
              <button id="btnMostrarResposta" class="add-block-btn">Mostrar Resposta</button>
            </div>
          </div>
    </div>

    <script src="data/palavras-jogo.js"></script>
    <script src="script.js"></script>
</body>
</html>
